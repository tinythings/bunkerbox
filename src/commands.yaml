# IT: import a prepared agent image built by a separate tool
install-image:
  commands:
    - |
      set -Eeuo pipefail

      if [ -z "${BUNKERBOX_OCI_ARCHIVE:-}" ]; then
        echo "BUNKERBOX_OCI_ARCHIVE is required" >&2
        exit 1
      fi

      if [ ! -f "$BUNKERBOX_OCI_ARCHIVE" ]; then
        echo "OCI archive not found: $BUNKERBOX_OCI_ARCHIVE" >&2
        exit 1
      fi

      sudo systemctl start containerd
      sudo ctr images import "$BUNKERBOX_OCI_ARCHIVE"

# IT: setup host runtime
setup:
  commands:
    - |
      set -Eeuo pipefail

      . /etc/os-release
      if [ "${ID:-}" != "ubuntu" ]; then
        echo "setup supports Ubuntu only" >&2
        exit 1
      fi

      case "${VERSION_ID:-}" in
        22.04|24.04) ;;
        *)
          echo "setup supports Ubuntu 22.04 or 24.04 only" >&2
          exit 1
          ;;
      esac

      if [ "$(uname -m)" != "x86_64" ]; then
        echo "this demo currently supports x86_64 only" >&2
        exit 1
      fi

    - |
      set -Eeuo pipefail

      missing=""
      for package in ca-certificates containerd containernetworking-plugins curl podman zstd; do
        if ! dpkg-query -W -f='${db:Status-Status}\n' "$package" 2>/dev/null | grep -qx installed; then
          missing="$missing $package"
        fi
      done

      if [ -n "$missing" ]; then
        echo "Installing missing packages:$missing"
        sudo apt-get update
        sudo env DEBIAN_FRONTEND=noninteractive apt-get install -y $missing
      fi

      if ! systemctl is-enabled containerd >/dev/null 2>&1; then
        sudo systemctl enable containerd >/dev/null
      fi

      if ! systemctl is-active containerd >/dev/null 2>&1; then
        sudo systemctl start containerd
      fi

    - |
      set -Eeuo pipefail

      CNI_PLUGIN_DIR="/opt/cni/bin"
      CNI_CONFIG="/etc/cni/net.d/00-bunkerbox.conflist"

      if [ ! -d "$CNI_PLUGIN_DIR" ]; then
        sudo install -d -m 0755 "$CNI_PLUGIN_DIR"
      fi

      if [ ! -d "$(dirname "$CNI_CONFIG")" ]; then
        sudo install -d -m 0755 "$(dirname "$CNI_CONFIG")"
      fi

      for plugin in bridge host-local firewall; do
        source="/usr/lib/cni/${plugin}"
        target="${CNI_PLUGIN_DIR}/${plugin}"

        if [ ! -x "$source" ]; then
          echo "CNI plugin missing after package install: $source" >&2
          exit 1
        fi

        if [ -e "$target" ] || [ -L "$target" ]; then
          if [ "$(readlink -f "$target")" != "$source" ]; then
            echo "refusing to replace existing CNI plugin: $target" >&2
            exit 1
          fi
        else
          echo "Linking CNI plugin: $target"
          sudo ln -s "$source" "$target"
        fi
      done

    - |
      set -Eeuo pipefail

      CNI_CONFIG="/etc/cni/net.d/00-bunkerbox.conflist"
      CNI_NETWORK_NAME="bunkerbox"
      CNI_BRIDGE="bunkerbox0"
      CNI_SUBNET="${BUNKERBOX_CNI_SUBNET:-10.247.0.0/24}"
      tmp="$(mktemp)"
      trap 'rm -f "$tmp"' EXIT

      if [ -f "$CNI_CONFIG" ] && ! grep -q '"name": "bunkerbox"' "$CNI_CONFIG"; then
        echo "refusing to overwrite existing CNI config: $CNI_CONFIG" >&2
        exit 1
      fi

      cat > "$tmp" <<EOF_CNI
      {
        "cniVersion": "1.0.0",
        "name": "${CNI_NETWORK_NAME}",
        "plugins": [
          {
            "type": "bridge",
            "bridge": "${CNI_BRIDGE}",
            "isGateway": true,
            "ipMasq": true,
            "hairpinMode": true,
            "ipam": {
              "type": "host-local",
              "ranges": [
                [
                  { "subnet": "${CNI_SUBNET}" }
                ]
              ],
              "routes": [
                { "dst": "0.0.0.0/0" }
              ]
            }
          },
          {
            "type": "firewall",
            "backend": "iptables"
          }
        ]
      }
      EOF_CNI

      if [ ! -f "$CNI_CONFIG" ] || ! sudo cmp -s "$tmp" "$CNI_CONFIG"; then
        echo "Writing CNI config: $CNI_CONFIG"
        sudo install -m 0644 "$tmp" "$CNI_CONFIG"
      fi

    - |
      set -Eeuo pipefail

      KATA_VERSION="${KATA_VERSION:-3.32.0}"
      KATA_TARBALL="/tmp/kata-static-${KATA_VERSION}-amd64.tar.zst"
      KATA_URL="https://github.com/kata-containers/kata-containers/releases/download/${KATA_VERSION}/$(basename "$KATA_TARBALL")"
      SHIM_LINK="/usr/local/bin/containerd-shim-kata-v2"

      if [ -x /opt/kata/bin/containerd-shim-kata-v2 ] && [ -L "$SHIM_LINK" ] && [ "$(readlink -f "$SHIM_LINK")" = "/opt/kata/bin/containerd-shim-kata-v2" ]; then
        exit 0
      fi

      if [ ! -f "$KATA_TARBALL" ]; then
        echo "Downloading Kata ${KATA_VERSION}..."
        curl -fsSL "$KATA_URL" -o "$KATA_TARBALL"
      fi

      echo "Installing Kata ${KATA_VERSION}"
      sudo rm -rf /opt/kata
      sudo tar --use-compress-program=unzstd -xf "$KATA_TARBALL" -C /
      sudo ln -sfn /opt/kata/bin/containerd-shim-kata-v2 "$SHIM_LINK"
      rm -f "$KATA_TARBALL"

      if [ ! -x /opt/kata/bin/containerd-shim-kata-v2 ]; then
        echo "Kata shim installation failed" >&2
        exit 1
      fi
