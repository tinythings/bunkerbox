name: kilocode
image: localhost/bunkerbox-kilocode:7.4.11
output: bunkerbox-kilocode-7.4.11.oci
overwrite: true
command:
  - kilo

build_args:
  KILOCODE_VERSION: "7.4.11"

hooks:
  # runs before persistent home is loaded
  before-home-load:

  # runs before app starts
  before-app:

  # runs after app exits
  after-app:

  # runs only when app exits non-zero
  app-error:

  # runs after persistent home is saved
  after-home-save:

containerfile: |
  FROM docker.io/library/alpine:3.22

  ARG KILOCODE_VERSION

  RUN apk add --no-cache \
        bash \
        ca-certificates \
        curl \
        git \
        libstdc++ \
        ncurses-terminfo-base \
        openssh-client \
        ripgrep \
      && curl -fsSL \
        "https://github.com/Kilo-Org/kilocode/releases/download/v${KILOCODE_VERSION}/kilo-linux-x64-baseline-musl.tar.gz" \
        -o /tmp/kilocode.tar.gz \
      && tar -xzf /tmp/kilocode.tar.gz -C /usr/local/bin kilo \
      && chmod 0755 /usr/local/bin/kilo \
      && rm -f /tmp/kilocode.tar.gz \
      && kilo --version

  RUN mkdir -p /workspace /home/bunkerbox /usr/local/bunkerbox/bin \
      && chmod 0777 /workspace /home/bunkerbox /usr/local/bunkerbox/bin

  COPY bunker-entrypoint /usr/local/bin/bunker-entrypoint
  RUN chmod 0755 /usr/local/bin/bunker-entrypoint

  COPY bunkerbox-vscomm /usr/local/bunkerbox/bin/bunkerbox-vscomm

  ENV HOME=/home/bunkerbox \
      XDG_CONFIG_HOME=/home/bunkerbox/.config \
      XDG_DATA_HOME=/home/bunkerbox/.local/share \
      XDG_STATE_HOME=/home/bunkerbox/.local/state \
      XDG_CACHE_HOME=/home/bunkerbox/.cache

  WORKDIR /workspace
  ENTRYPOINT ["/usr/local/bin/bunker-entrypoint"]

runtime:
  workspace: cow
  home: persist
  session_mb: 50
  network: bridge
  allow:
    - api.deepseek.com
  encrypt:
    - ".local/share/kilo/auth.json"
    - ".local/share/kilo/account.json"
