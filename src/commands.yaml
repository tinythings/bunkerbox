# IT: import a prepared agent image built by a separate tool
install-image:
  commands:
    - |
      set -Eeuo pipefail

      if [ -z "${BUNKERBOX_OCI_ARCHIVE:-}" ]; then
        echo "BUNKERBOX_OCI_ARCHIVE is required" >&2
        exit 1
      fi

      if [ ! -f "$BUNKERBOX_OCI_ARCHIVE" ]; then
        echo "OCI archive not found: $BUNKERBOX_OCI_ARCHIVE" >&2
        exit 1
      fi

      sudo systemctl start containerd
      sudo ctr images import "$BUNKERBOX_OCI_ARCHIVE"

# IT: setup host runtime
setup:
  commands:
    - |
      set -Eeuo pipefail

      . /etc/os-release
      if [ "${ID:-}" != "ubuntu" ]; then
        echo "setup supports Ubuntu only" >&2
        exit 1
      fi

      case "${VERSION_ID:-}" in
        22.04|24.04) ;;
        *)
          echo "setup supports Ubuntu 22.04 or 24.04 only" >&2
          exit 1
          ;;
      esac

      if [ "$(uname -m)" != "x86_64" ]; then
        echo "this demo currently supports x86_64 only" >&2
        exit 1
      fi

    - |
      set -Eeuo pipefail

      missing=""
      for package in ca-certificates containerd curl podman zstd; do
        if ! dpkg-query -W -f='${db:Status-Status}\n' "$package" 2>/dev/null | grep -qx installed; then
          missing="$missing $package"
        fi
      done

      if [ -n "$missing" ]; then
        echo "Installing missing packages:$missing"
        sudo apt-get update
        sudo env DEBIAN_FRONTEND=noninteractive apt-get install -y $missing
      fi

      if ! systemctl is-enabled containerd >/dev/null 2>&1; then
        sudo systemctl enable containerd >/dev/null
      fi

      if ! systemctl is-active containerd >/dev/null 2>&1; then
        sudo systemctl start containerd
      fi

    - |
      set -Eeuo pipefail

      KATA_DIR="${BUNKERBOX_KATA_DIR:-/usr/lib/bunkerbox/kata}"
      SHIM_LINK="/usr/local/bin/containerd-shim-kata-v2"
      KATA_CONFIG_DIR="/etc/kata-containers"
      KATA_CONFIG_LINK="${KATA_CONFIG_DIR}/configuration.toml"
      KATA_CONFIG_SOURCE="${KATA_DIR}/share/defaults/kata-containers/configuration.toml"

      if [ ! -x "${KATA_DIR}/bin/containerd-shim-kata-v2" ]; then
        echo "Kata shim missing from share install: ${KATA_DIR}/bin/containerd-shim-kata-v2" >&2
        exit 1
      fi

      if [ ! -f "$KATA_CONFIG_SOURCE" ]; then
        echo "Kata config missing from share install: $KATA_CONFIG_SOURCE" >&2
        exit 1
      fi

      sudo ln -sfn "${KATA_DIR}/bin/containerd-shim-kata-v2" "$SHIM_LINK"
      sudo install -d -m 0755 "$KATA_CONFIG_DIR"
      sudo ln -sfn "$KATA_CONFIG_SOURCE" "$KATA_CONFIG_LINK"
