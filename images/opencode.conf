name: opencode
image: localhost/bunkerbox-opencode:1.17.18
output: bunkerbox-opencode-1.17.18.oci
overwrite: true
command:
  - opencode

build_args:
  OPENCODE_VERSION: "1.17.18"

hooks:
  # runs before persistent home is loaded
  before-home-load:

  # runs before app starts
  before-app:

  # runs after app exits
  after-app:

  # runs only when app exits non-zero
  app-error:

  # runs after persistent home is saved
  after-home-save:

containerfile: |
  FROM docker.io/library/alpine:3.22

  ARG OPENCODE_VERSION

  RUN apk add --no-cache \
        bash \
        ca-certificates \
        curl \
        e2fsprogs \
        git \
        libstdc++ \
        ncurses-terminfo-base \
        openssh-client \
        ripgrep \
      && curl -fsSL \
        "https://github.com/anomalyco/opencode/releases/download/v${OPENCODE_VERSION}/opencode-linux-x64-baseline-musl.tar.gz" \
        -o /tmp/opencode.tar.gz \
      && tar -xzf /tmp/opencode.tar.gz -C /usr/local/bin opencode \
      && chmod 0755 /usr/local/bin/opencode \
      && rm -f /tmp/opencode.tar.gz \
      && opencode --version

  RUN mkdir -p /workspace /home/bunkerbox \
      && chmod 0777 /workspace /home/bunkerbox

  COPY bunker-entrypoint /usr/local/bin/bunker-entrypoint
  RUN chmod 0755 /usr/local/bin/bunker-entrypoint

  ENV HOME=/home/bunkerbox \
      XDG_CONFIG_HOME=/home/bunkerbox/.config \
      XDG_DATA_HOME=/home/bunkerbox/.local/share \
      XDG_STATE_HOME=/home/bunkerbox/.local/state \
      XDG_CACHE_HOME=/home/bunkerbox/.cache

  WORKDIR /workspace
  ENTRYPOINT ["/usr/local/bin/bunker-entrypoint"]

runtime:
  workspace: cow
  home: persist
  session_mb: 50
  network: bridge
  allow:
    - api.deepseek.com
  encrypt:
    - ".local/share/opencode/auth.json"
    - ".local/share/opencode/account.json"
